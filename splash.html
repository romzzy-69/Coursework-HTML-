<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , initial-scale=1.0"/>
        <title>SplashScreen</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

        <!-- Fallback redirect to Home Page after 5 seconds, in case JavaScript is disabled.
             The JS timer below also redirects after 4 seconds when JS is enabled. -->
        <meta http-equiv="refresh" content="5; url=home.html"/>
        <style>

            /* Universal reset: removes default browser spacing and 
               makes width/height calculations include padding/border */
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            /* Full-screen ocean background image that fills the viewport */
            body{
                 background-image: url("./assets/images/OceanWater.jfif");
                 background-size: cover;
                 background-position: center;
                 background-repeat: no-repeat;
                 height: 100vh;
                font-family:Arial, Helvetica, sans-serif;
            }

            /* Dark semi-transparent layer over the background image so white text stays readable.
               Uses flexbox to centre all content both vertically and horizontally. */
            .overlay {
                width:100%;
                height:100vh;
                background:rgba(0,0,0,0.35);
                display:flex;
                justify-content:center;
                align-items:center;
                text-align:center;
                color:white;
            }

            /* Constrains the width of the centred content block */
            .content{
                width:80%;
                max-width:900px;
            
            }

            /* Site title styling */
            h1 {
                font-size:70px;
                font-weight:bold;
                margin-bottom:10px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* improves legibility over the busy background */
            }

            /* Mission statement text below the title */
            h2{
                font-size:20px;
                font-weight:400;
                line-height:1.5;
                font-family: 'Poppins', sans-serif;

            }

            /* Semi-transparent card containing the team member list */
            .card{
                width:500px;
                margin:20px auto;
                padding:25px;
                background:rgba(0,0,0,0.4);
                border-radius:15px;

            }

            .card h3{
                color:#00bfff;
                margin-bottom:12px;
                padding-bottom:8px;
                font-size:22px;
                
            }

            /* Two-column grid layout for the 4 team member names */
            .members{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:15px;
            }

            .members div{
                background:rgba(255,255,255,0.15);
                padding:10px;
                border-radius:8px;

            }

            /* Highlights the "Blue" part of "BlueFuture" in the site title */
            .content h1 strong{
                color:#00bfff;
            }

            /* ============================================
               COUNTDOWN LOADER
               CSS-only spinning animation shown next to the
               countdown text (no image or JS needed for the spin itself)
               ============================================ */
            .countdown-row{
                display:flex;
                align-items:center;
                justify-content:center;
                gap:12px;
                margin:18px 0 12px;
            }

            /* Circular spinner: top border coloured white, rest transparent-ish,
               rotated continuously via the spin keyframes below */
            .loader{
                width:28px;
                height:28px;
                border:3px solid rgba(255,255,255,0.3);
                border-top:3px solid #ffffff;
                border-radius:50%;
                animation:spin 1s linear infinite;
            }

            /* Rotates the loader a full 360 degrees, repeating indefinitely */
            @keyframes spin{
                0%{transform:rotate(0deg);}
                100%{transform:rotate(360deg);}
            }

            /* Countdown text, e.g. "Entering site in 4..." - updated live by JS */
            .countdown{
                font-size:18px;
                color:#ffffff;
                font-family: 'Poppins', sans-serif;
                letter-spacing:1px;
            }

            /* "Skip Intro" button: outlined pill button that inverts colours on hover */
            .skip-btn{
                display:inline-block;
                margin-top:8px;
                padding:12px 32px;
                border:2px solid #ffffff;
                border-radius:99px;
                color:#ffffff;
                font-size:16px;
                font-weight:600;
                font-family:'Poppins', sans-serif;
                text-decoration:none;
                transition:background-color 0.2s ease, color 0.2s ease;
            }

            .skip-btn:hover{
                background-color:#ffffff;
                color:#0d2b4e;
            }

            /* Logo image sizing above the site title */
            .content img{
                width:60px;
                height:60px;
                margin-bottom:10px;
            }

            /* ============================================
               MOBILE RESPONSIVE OVERRIDES
               Shrinks type, lets the card fit smaller
               screens, and stacks the member grid on very
               small phones.
               ============================================ */
            @media (max-width: 768px){
                .content{
                    width:90%;
                }

                h1{
                    font-size:42px;
                }

                h2{
                    font-size:16px;
                }

                .card{
                    width:100%;
                    max-width:400px;
                    padding:18px;
                }

                .card h3{
                    font-size:18px;
                }

                .members{
                    gap:10px;
                }

                .members div{
                    font-size:14px;
                    padding:8px;
                }

                .countdown{
                    font-size:15px;
                }

                .skip-btn{
                    padding:10px 24px;
                    font-size:14px;
                }
            }

            @media (max-width: 420px){
                h1{
                    font-size:32px;
                }

                .members{
                    grid-template-columns:1fr; /* single column on very narrow phones */
                }
            }


        </style>
    </head>
    <body>
        <!-- Full-screen dark overlay wrapping all splash screen content -->
        <div class="overlay">
            <div class="content">
                <img src="assets/images/logo.svg" alt="BlueFuture Logo"/>
                 <h1><strong>Blue</strong>Future</h1>
                <h2>Protect marine ecosystems, reduce pollution,
                    conserve biodiversity, and promote sustainable
                    use of oceans.</h2>

                <!-- Team member card, displayed in a 2-column grid -->
                <div class="card">
                    <h3>Team Coral</h3>
                    <div class="members">
                        <div>Umar Hunais</div>
                        <div>Shevin Sheron</div>
                        <div>Thesandu Methvan</div>
                        <div>Pahandi Pabasara Wickramanayake</div>
                    </div>

                </div>

                <!-- Countdown row: CSS spinner + live countdown text (updated by JS below) -->
                <div class="countdown-row">
                <div class="loader"></div>
                <p class="countdown">Entering site in 4...</p>
            </div>

            <!-- Manual skip link: takes the user straight to the Home Page,
                 bypassing the countdown/auto-redirect -->
            <a href="home.html" class="skip-btn">Skip Intro</a>
            </div>
            
        </div>

    <script>
        // Starting countdown value in seconds (matches the visible "Entering site in 4..." text)
        let seconds=4;

        // Reference to the countdown paragraph so its text can be updated each tick
        const countdown = document.querySelector('.countdown');

        // Runs every 1000ms (1 second): decreases the counter and updates the on-screen text.
        // Once the counter reaches 0, stops the timer and redirects to the Home Page.
        const timer = setInterval(function(){
            seconds=seconds-1;
            countdown.textContent = 'Entering site in '+seconds +'...';

            if(seconds===0){
                clearInterval(timer);
                window.location.href='home.html';
            }
        },1000);
    </script>

    </body>

</html>
