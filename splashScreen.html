<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , initial-scale=1.0"/>
        <title>SplashScreen</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">


        <meta http-equiv="refresh" content="5; url=index.html"/>
        <style>

            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }
            body{
                 background-image: url("./assets/images/OceanWater.jfif");
                 background-size: cover;
                 background-position: center;
                 background-repeat: no-repeat;
                 height: 100vh;
                font-family:Arial, Helvetica, sans-serif;
            }

            .overlay {
                width:100%;
                height:100vh;
                background:rgba(0,0,0,0.35);
                display:flex;
                justify-content:center;
                align-items:center;
                text-align:center;
                color:white;
            }

            .content{
                width:80%;
                max-width:900px;
            
            }

            h1 {
                font-size:70px;
                font-weight:bold;
                margin-bottom:10px;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            }

            h2{
                font-size:20px;
                font-weight:400;
                line-height:1.5;
                font-family: 'Poppins', sans-serif;

            }

            .card{
                width:500px;
                margin:20px auto;
                padding:25px;
                background:rgba(0,0,0,0.4);
                border-radius:15px;

            }

            .card h3{
                color:#00bfff;
                margin-bottom:12px;
                padding-bottom:8px;
                font-size:22px;
                
            }

            .members{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:15px;
            }

            .members div{
                background:rgba(255,255,255,0.15);
                padding:10px;
                border-radius:8px;

            }
            .content h1 strong{
                color:#00bfff;
            }

            /* loader */
            .countdown-row{
                display:flex;
                align-items:center;
                justify-content:center;
                gap:12px;
                margin:18px 0 12px;
            }

            .loader{
                width:28px;
                height:28px;
                border:3px solid rgba(255,255,255,0.3);
                border-top:3px solid #ffffff;
                border-radius:50%;
                animation:spin 1s linear infinite;
            }

            @keyframes spin{
                0%{transform:rotate(0deg);}
                100%{transform:rotate(360deg);}
            }

            .countdown{
                font-size:18px;
                color:#ffffff;
                font-family: 'Poppins', sans-serif;
                letter-spacing:1px;
            }

            .skip-btn{
                display:inline-block;
                margin-top:8px;
                padding:12px 32px;
                border:2px solid #ffffff;
                border-radius:99px;
                color:#ffffff;
                font-size:16px;
                font-weight:600;
                font-family:'Poppins', sans-serif;
                text-decoration:none;
                transition:background-color 0.2s ease, color 0.2s ease;
            }

            .skip-btn:hover{
                background-color:#ffffff;
                color:#0d2b4e;
            }

            .content img{
                width:60px;
                height:60px;
                margin-bottom:10px;
            }


        </style>
    </head>
    <body>
        <div class="overlay">
            <div class="content">
                <img src="assets/images/logo.svg" alt="BlueFuture Logo"/>
                 <h1><strong>Blue</strong>Future</h1>
                <h2>Protect marine ecosystems, reduce pollution,
                    conserve biodiversity, and promote sustainable
                    use of oceans.</h2>
                <div class="card">
                    <h3>Team Coral</h3>
                    <div class="members">
                        <div>Umar Hunais</div>
                        <div>Shevin Sheron</div>
                        <div>Thesandu Methvan</div>
                        <div>Pahandi Pabasara Wickramanayake</div>
                    </div>

                </div>
                <div class="countdown-row">
                <div class="loader"></div>
                <p class="countdown">Entering site in 4...</p>
            </div>
            <a href="index.html" class="skip-btn">Skip Intro</a>
            </div>
            
        </div>

    <script>
        let seconds=4;
        const countdown = document.querySelector('.countdown');

        const timer = setInterval(function(){
            seconds=seconds-1;
            countdown.textContent = 'Entering site in '+seconds +'...';

            if(seconds===0){
                clearInterval(timer);
                window.location.href='index.html';
            }
        },1000);
    </script>

    </body>

</html>
